<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ContactUs-Mediminders</title>
    <link rel="stylesheet" href=" style.css">
</head>
<body>
        <section id="contact" class="contact-section">
        <div class="contact-form-wrapper">
            <div class="contact-header">
                <h2 class="contact-title">Get In Touch</h2>
                <p class="contact-subtitle">Let's start the conversation</p>
            </div>
            <form action="#" method="POST" class="contact-form">
                
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="eg: John Bareli" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="eg: xyz@gmail.com" required>
                
                <label for="message">What do you have in mind?</label>
                <textarea id="message" name="message" rows="6" required></textarea>
                
                <button type="submit" class="btn submit-message">Send Message</button> 
            </form>
        </div>
    </section>  
    <footer class="site-footer">
        <div class="footer-container">
            
            <div class="footer-icon">
                <img src="assets/images/browser_icon.png" alt="Browser Icon" class="browser-icon">
            </div>
            
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="index.html">About Us</a>
                <a href="index.html">Products</a>
                <a href="review.html">Reviews</a>
            </div>
            
            <div class="footer-contact">
                <p class="contact-title-footer">Contact Us</p>
                <p>+033 5353 6767</p>
                <p>8777283907</p>
                <p>mediminder@gmail.com</p>
            </div>
            
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
